<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="container-fluid px-5 py-5">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="fw-bold text-primary">VitalSync</h1>
                <p class="text-muted">Patient Health Tracker v1.0</p>
            </div>
            <button class="btn btn-primary px-4 rounded-pill" data-bs-toggle="modal" data-bs-target="#modal">Log
                Vitals</button>
        </div>

        <!-- body -->
        <div class="row mb-5">
            <div class="col-4">
                <!-- heart Card -->
                <div class="card">
                    <div class="card-body">
                        <small class="card-title  fw-bold text-uppercase text-muted">Heart Rate</small>
                        <div id="heartRate" class="h2">-----</div>
                    </div>
                </div>
            </div>
            <!-- blood card -->
            <div class="col-4">
                <div class="card">
                    <div class="card-body">
                        <small class="card-title fw-bold text-uppercase  text-muted">Blood Pressure</small>
                        <div id="bloodPressure" class="h2">-----</div>
                    </div>
                </div>
            </div>
            <!-- tota reading card -->
            <div class="col-4">
                <div class="card">
                    <div class="card-body">
                        <small class="card-title  fw-bold text-uppercase text-muted">Readings</small>
                        <div id="reading" class="h2">-----</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center p-4">
            <h5 class="fw-bold">Recent Readings</h5>

            <table class="table p-5">
                <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Heart Rate (bpm)</th>
                        <th>Blood Pressure</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table-data">

                </tbody>
            </table>


        </div>

    </div>
    <!-- div.modal
  └── div.modal-dialog
        └── div.modal-content
              ├── div.modal-header
              ├── div.modal-body
              └── div.modal-footer -->


    <div id="modal" class="modal fade" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 pb-3">
                <div class="modal-header border-0 pb-0">
                    <h4 class="fw-bold text-muted">Logs</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="vitalForm">
                        <!-- heart rate input -->
                        <div class="mb-3">
                            <label  class="fw-bold text-muted form-label small">Heart Rate</label>
                            <input id="inputHeartRate" type="number" placeholder="0.0" required class="rounded-3 form-control">
                        </div>
                        <!-- heart rate input -->
                        <div class="mb-3">
                            <label  class="fw-bold text-muted form-label small">Blood Pressure</label>
                            <input id="inputBloodPressure" type="number" placeholder="0.0" required class="rounded-3 form-control">
                        </div>
                        <!-- button for submission -->
                        <button class="btn btn-primary w-50 rounded-pill py-3 mt-2" type="submit">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/home.js"></script>
</body>

</html>
